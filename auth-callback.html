<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Confirm your Frameup account.">
  <title>Confirming your account | Frameup</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth-state.css?v=20260714-authstate1">
  <link rel="stylesheet" href="cta-hover.css?v=20260720-stroke1">
  <script src="es-auth-config.js?v=20260714-authcallback1"></script>
  <script src="es-auth.js?v=20260714-authcallback2"></script>
</head>
<body class="auth-state-page">
  <main class="auth-state-card" aria-live="polite">
    <img class="auth-state-brand" src="brand-logo-blue.svg" alt="EssentiallySports">
    <div class="auth-state-icon" id="callback-icon" aria-hidden="true"><span class="auth-state-spinner"></span></div>
    <h1 class="auth-state-title" id="callback-title">Confirming your account</h1>
    <p class="auth-state-copy" id="callback-message">One moment while Frameup verifies your secure link.</p>
    <div class="auth-state-actions" id="callback-actions" hidden>
      <a class="auth-state-button is-primary" id="continue-link" href="index.html">Continue to Frameup</a>
      <a class="auth-state-button" id="login-link" href="login.html">Return to login</a>
    </div>
  </main>

  <script>
    (() => {
      const icon = document.getElementById('callback-icon');
      const title = document.getElementById('callback-title');
      const message = document.getElementById('callback-message');
      const actions = document.getElementById('callback-actions');
      const continueLink = document.getElementById('continue-link');
      const loginLink = document.getElementById('login-link');
      const successIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12.5 4.2 4L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const errorIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 8v5m0 3.5v.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

      function getRedirectTarget() {
        const fallback = 'index.html';
        const rawTarget = new URL(window.location.href).searchParams.get('redirect') || fallback;
        try {
          const target = new URL(rawTarget, window.location.origin);
          if (target.origin !== window.location.origin) return fallback;
          if (/\/(?:auth-callback|login)\.html$/i.test(target.pathname)) return fallback;
          const path = target.pathname.replace(/^\//, '') || fallback;
          return `${path}${target.search}${target.hash}`;
        } catch (error) {
          return fallback;
        }
      }

      const redirectTarget = getRedirectTarget();
      continueLink.href = redirectTarget;

      function successLoginUrl() {
        const loginUrl = new URL('login.html', window.location.origin);
        loginUrl.searchParams.set('mode', 'login');
        loginUrl.searchParams.set('confirmation', 'success');
        if (redirectTarget !== 'index.html') loginUrl.searchParams.set('redirect', redirectTarget);
        return `${loginUrl.pathname.replace(/^\//, '')}${loginUrl.search}`;
      }

      function showSuccess({ requiresLogin = false } = {}) {
        document.title = 'Account confirmed | Frameup';
        icon.innerHTML = successIcon;
        icon.classList.add('is-success');
        title.textContent = 'Email confirmed';
        message.textContent = requiresLogin
          ? 'Your Frameup account is ready. Log in with your password to continue.'
          : 'Your Frameup account is ready. Taking you to the workspace now.';
        if (requiresLogin) {
          continueLink.textContent = 'Log in to Frameup';
          continueLink.href = successLoginUrl();
        }
        loginLink.hidden = true;
        actions.hidden = false;
      }

      function showError(error) {
        document.title = 'Confirmation link issue | Frameup';
        icon.innerHTML = errorIcon;
        icon.classList.add('is-error');
        title.textContent = 'We could not confirm that link';
        message.textContent = error?.message || 'This link has already been used or has expired. Your account may already be confirmed—return to login and try signing in.';
        continueLink.hidden = true;
        const loginUrl = new URL('login.html', window.location.origin);
        loginUrl.searchParams.set('mode', 'login');
        loginUrl.searchParams.set('confirmation', 'failed');
        if (redirectTarget !== 'index.html') loginUrl.searchParams.set('redirect', redirectTarget);
        loginLink.href = `${loginUrl.pathname.replace(/^\//, '')}${loginUrl.search}`;
        actions.hidden = false;
      }

      async function boot() {
        try {
          const result = await window.ESAuth.completeAuthCallback();
          window.history.replaceState({}, document.title, window.location.pathname);
          showSuccess({ requiresLogin: Boolean(result?.requiresLogin) });
          if (result?.requiresLogin) return;
          window.setTimeout(() => window.location.replace(redirectTarget), 1400);
        } catch (error) {
          window.history.replaceState({}, document.title, window.location.pathname);
          showError(error);
        }
      }

      boot();
    })();
  </script>
</body>
</html>
