<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reset your FrameUp password.">
  <title>Reset Password | FrameUp</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth-state.css?v=20260714-authstate1">
  <link rel="stylesheet" href="cta-hover.css?v=20260720-stroke1">
  <script src="es-auth-config.js?v=20260714-authstate1"></script>
  <script src="es-auth.js?v=20260714-authcallback2"></script>
</head>
<body class="auth-state-page">
  <main class="auth-state-card" aria-live="polite">
    <img class="auth-state-brand" src="brand-logo-blue.svg" alt="EssentiallySports">
    <div class="auth-state-icon" id="reset-icon" aria-hidden="true"><span class="auth-state-spinner"></span></div>
    <h1 class="auth-state-title">Reset password</h1>
    <p class="auth-state-copy" id="reset-intro">Confirming your secure recovery link…</p>

    <form class="auth-state-form" id="reset-form" hidden novalidate>
      <label class="auth-state-field">
        New password
        <span class="auth-state-input-wrap">
          <input class="auth-state-input" id="new-password" type="password" autocomplete="new-password" minlength="8" required>
          <button class="auth-state-password-toggle" type="button" data-password-toggle="new-password" aria-label="Show new password"></button>
        </span>
      </label>
      <label class="auth-state-field">
        Confirm new password
        <span class="auth-state-input-wrap">
          <input class="auth-state-input" id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
          <button class="auth-state-password-toggle" type="button" data-password-toggle="confirm-password" aria-label="Show confirmed password"></button>
        </span>
      </label>
      <button class="auth-state-button is-primary" id="reset-button" type="submit">Update password</button>
    </form>

    <p class="auth-state-status" id="reset-status" role="status" aria-live="polite"></p>
    <div class="auth-state-actions" id="reset-actions" hidden>
      <a class="auth-state-button" id="login-link" href="login.html">Return to login</a>
    </div>
  </main>

  <script>
    (() => {
      const form = document.getElementById('reset-form');
      const icon = document.getElementById('reset-icon');
      const intro = document.getElementById('reset-intro');
      const passwordInput = document.getElementById('new-password');
      const confirmInput = document.getElementById('confirm-password');
      const button = document.getElementById('reset-button');
      const status = document.getElementById('reset-status');
      const actions = document.getElementById('reset-actions');
      const loginLink = document.getElementById('login-link');
      const successIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12.5 4.2 4L19 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const errorIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 8v5m0 3.5v.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
      const eyeIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.7" stroke="currentColor" stroke-width="1.8"/></svg>';
      const eyeOffIcon = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m3 3 18 18M10.6 6.2c.5-.1.9-.2 1.4-.2 6 0 9.5 6 9.5 6a17 17 0 0 1-2.6 3.3M6.1 6.1C3.8 7.8 2.5 12 2.5 12s3.5 6 9.5 6c1.2 0 2.3-.2 3.3-.6M9.9 9.9a3 3 0 0 0 4.2 4.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

      function showStatus(message, success = false) {
        status.textContent = message || '';
        status.classList.toggle('is-success', success);
        status.classList.toggle('is-error', Boolean(message) && !success);
      }

      function showErrorState(message) {
        document.title = 'Password reset link issue | FrameUp';
        icon.innerHTML = errorIcon;
        icon.classList.add('is-error');
        intro.textContent = 'This password recovery link is invalid or has expired.';
        const normalizedMessage = String(message || '').toLowerCase();
        const recoveryMessage = (
          normalizedMessage.includes('confirmation link')
          || normalizedMessage.includes('confirm this email')
        )
          ? ''
          : String(message || '').trim();
        showStatus(recoveryMessage || 'Request a new password reset link from the FrameUp login page.');
        actions.hidden = false;
      }

      function initializePasswordToggles() {
        document.querySelectorAll('[data-password-toggle]').forEach(toggle => {
          const input = document.getElementById(toggle.dataset.passwordToggle);
          if (!input) return;
          toggle.innerHTML = eyeIcon;
          toggle.addEventListener('click', () => {
            const shouldShow = input.type === 'password';
            input.type = shouldShow ? 'text' : 'password';
            toggle.innerHTML = shouldShow ? eyeOffIcon : eyeIcon;
            toggle.setAttribute('aria-label', shouldShow ? 'Hide password' : 'Show password');
            input.focus();
          });
        });
      }

      async function boot() {
        try {
          const session = await window.ESAuth?.completeAuthCallback?.();
          if (!session?.token) {
            showErrorState();
            return;
          }

          window.history.replaceState({}, document.title, window.location.pathname);
          icon.innerHTML = successIcon;
          icon.classList.add('is-success');
          intro.textContent = 'Choose a new password with at least 8 characters.';
          form.hidden = false;
          passwordInput.focus();
        } catch (error) {
          showErrorState(error?.message || 'Unable to validate this recovery link. Request a new link and try again.');
        }
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();
        showStatus('');

        const password = passwordInput.value;
        if (password.length < 8) {
          showStatus('Password must be at least 8 characters.');
          passwordInput.focus();
          return;
        }
        if (password !== confirmInput.value) {
          showStatus('Passwords do not match.');
          confirmInput.focus();
          return;
        }

        button.disabled = true;
        button.textContent = 'Updating…';
        try {
          await window.ESAuth.updatePassword(password);
          await window.ESAuth.logout();
          form.hidden = true;
          intro.textContent = 'Your password has been updated.';
          showStatus('You can now log in with your new password.', true);
          actions.hidden = false;
          loginLink.focus();
        } catch (error) {
          showStatus(error.message || 'Unable to update the password.');
          button.disabled = false;
          button.textContent = 'Update password';
        }
      });

      initializePasswordToggles();
      boot();
    })();
  </script>
</body>
</html>
