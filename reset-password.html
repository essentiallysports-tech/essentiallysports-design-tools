<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Reset your FrameUp password.">
  <title>Reset Password | FrameUp</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="es-auth-config.js?v=20260707-auth4"></script>
  <script src="es-auth.js?v=20260708-authlazy1"></script>
  <style>
    :root {
      --accent: #0A7DFA;
      --accent-hover: #076DDB;
      --navy: #033162;
      --muted: #6C7A89;
      --border: #B7D8FF;
      --surface: #FFFFFF;
      --page: #F5FAFF;
      --font: "Roboto Condensed", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 15%, rgba(10, 125, 250, .1), transparent 34%),
        var(--page);
      color: var(--navy);
      font-family: var(--font);
    }
    .reset-card {
      width: min(100%, 440px);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(3, 49, 98, .12);
    }
    .brand {
      width: min(100%, 260px);
      height: auto;
      display: block;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(34px, 7vw, 48px);
      font-weight: 900;
      line-height: .98;
    }
    .intro {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }
    form {
      display: grid;
      gap: 16px;
    }
    label {
      display: grid;
      gap: 7px;
      font-size: 15px;
      font-weight: 700;
    }
    input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--navy);
      font: 500 16px/1 var(--font);
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(10, 125, 250, .14);
    }
    button,
    .login-link {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font: 700 16px/1 var(--font);
    }
    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(10, 125, 250, .2);
    }
    button:hover,
    button:focus-visible { background: var(--accent-hover); }
    button[disabled] { cursor: wait; opacity: .7; }
    .login-link {
      border: 1px solid var(--border);
      color: var(--navy);
      text-decoration: none;
    }
    .status {
      min-height: 20px;
      margin: 2px 0 0;
      color: #C62828;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
    }
    .status.is-success { color: #2E7D32; }
    [hidden] { display: none !important; }
    @media (max-width: 520px) {
      .reset-card { padding: 28px 22px; }
    }
  </style>
<link rel="stylesheet" href="site-mobile-chrome.css?v=20260710-mobile-root2">
<link rel="stylesheet" href="theme.css?v=20260712-darkmode10">
<script src="theme.js?v=20260712-darkmode10"></script>
<script src="site-mobile-chrome.js?v=20260710-mobile-root2"></script>
</head>
<body>
  <main class="reset-card">
    <img class="brand" src="brand-logo-blue.svg" alt="EssentiallySports">
    <h1>Reset password</h1>
    <p class="intro" id="reset-intro">Confirming your secure recovery link…</p>

    <form id="reset-form" hidden novalidate>
      <label>
        New password
        <input id="new-password" type="password" autocomplete="new-password" minlength="8" required>
      </label>
      <label>
        Confirm new password
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required>
      </label>
      <button id="reset-button" type="submit">Update Password</button>
    </form>

    <p class="status" id="reset-status" role="status" aria-live="polite"></p>
    <a class="login-link" id="login-link" href="login.html" hidden>Return to Login</a>
  </main>

  <script>
    (() => {
      const form = document.getElementById('reset-form');
      const intro = document.getElementById('reset-intro');
      const passwordInput = document.getElementById('new-password');
      const confirmInput = document.getElementById('confirm-password');
      const button = document.getElementById('reset-button');
      const status = document.getElementById('reset-status');
      const loginLink = document.getElementById('login-link');

      function showStatus(message, success = false) {
        status.textContent = message || '';
        status.classList.toggle('is-success', success);
      }

      async function boot() {
        const session = await window.ESAuth?.getSession?.();
        if (!session?.token) {
          intro.textContent = 'This password recovery link is invalid or has expired.';
          showStatus('Request a new reset link from the FrameUp login page.');
          loginLink.hidden = false;
          return;
        }

        intro.textContent = 'Choose a new password with at least 8 characters.';
        form.hidden = false;
        passwordInput.focus();
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();
        showStatus('');

        const password = passwordInput.value;
        if (password.length < 8) {
          showStatus('Password must be at least 8 characters.');
          passwordInput.focus();
          return;
        }
        if (password !== confirmInput.value) {
          showStatus('Passwords do not match.');
          confirmInput.focus();
          return;
        }

        button.disabled = true;
        button.textContent = 'Updating…';
        try {
          await window.ESAuth.updatePassword(password);
          await window.ESAuth.logout();
          form.hidden = true;
          intro.textContent = 'Your password has been updated.';
          showStatus('You can now log in with your new password.', true);
          loginLink.hidden = false;
          loginLink.focus();
        } catch (error) {
          showStatus(error.message || 'Unable to update the password.');
          button.disabled = false;
          button.textContent = 'Update Password';
        }
      });

      boot();
    })();
  </script>
</body>
</html>
